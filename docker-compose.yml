services:
  dev:
    image: 1div0/dev-env:latest
    volumes:
      - dev-persist:/home/dev/persist
    stdin_open: true
    tty: true
    cap_add:
      - SYS_PTRACE   # GDB, Valgrind
      - PERFMON      # perf kernel profiling (Linux 5.8+)
    security_opt:
      - seccomp:unconfined
    hostname: dev
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  dev-persist:
    name: dev-persist
    external: true
